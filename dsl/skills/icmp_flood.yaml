# Skill: icmp_flood
# Intent: Generate ICMP Echo (ping) flood traffic on specified ports
# Grounded in: knowledge/lua_api.yaml (pktgen.icmp_echo, pktgen.ping4, pktgen.set_proto)

skill:
  name: "icmp_flood"
  intent: "traffic_generation"
  description: "Configure ports and send an ICMP Echo Request flood to a specified destination at a configurable rate, packet size, and count. ICMP has no port numbers — uses TTL instead of sport/dport."

  params:
    # ── 必需参数 ──
    - name: "rate"
      type: "float"
      description: "Packet rate in percentage (0-100)"
      required: true
      constraints: { min: 0, max: 100 }

    # ── L3 寻址 ──
    - name: "dst_ip"
      type: "ip_address"
      description: "Destination IP address"
      required: false
      default: "10.10.10.2"

    - name: "src_ip"
      type: "string"
      description: "Source IP address (CIDR format, e.g. 192.168.1.1/24)"
      required: false
      default: "192.168.1.1/24"

    # ── L2 寻址 ──
    - name: "dst_mac"
      type: "string"
      description: "Destination MAC address (format: XX:XX:XX:XX:XX:XX)"
      required: false
      default: "00:00:00:00:00:01"

    - name: "src_mac"
      type: "string"
      description: "Source MAC address (format: XX:XX:XX:XX:XX:XX)"
      required: false
      default: "00:00:00:00:00:02"

    # ── ICMP 特有 ──
    - name: "ttl"
      type: "integer"
      description: "IP TTL value"
      required: false
      default: 64

    # ── 流量控制 ──
    - name: "pktSize"
      type: "integer"
      description: "Packet size in bytes"
      required: false
      default: 64
      constraints: { min: 64, max: 1518 }

    - name: "count"
      type: "integer"
      description: "Number of packets to transmit (0 = forever)"
      required: false
      default: 0

    - name: "burst"
      type: "integer"
      description: "Tx burst size"
      required: false
      default: 128

  topology:
    tx_port:
      portlist: "0"
      description: "Port used for TX"

  setup:
    - comment: "Disable screen updates for performance"
      api: "pktgen.screen"
      args: ['"off"']

    - comment: "Set packet type to IPv4"
      api: "pktgen.set_type"
      args: ["$topology.tx_port", '"ipv4"']

    - comment: "Set protocol to ICMP"
      api: "pktgen.set_proto"
      args: ["$topology.tx_port", '"icmp"']

    - comment: "Set destination IP address"
      api: "pktgen.set_ipaddr"
      args: ["$topology.tx_port", '"dst"', "$params.dst_ip"]

    - comment: "Set source IP address"
      api: "pktgen.set_ipaddr"
      args: ["$topology.tx_port", '"src"', "$params.src_ip"]

    - comment: "Set destination MAC address"
      api: "pktgen.set_mac"
      args: ["$topology.tx_port", '"dst"', "$params.dst_mac"]

    - comment: "Set source MAC address"
      api: "pktgen.set_mac"
      args: ["$topology.tx_port", '"src"', "$params.src_mac"]

    - comment: "Enable ICMP Echo on port"
      api: "pktgen.icmp_echo"
      args: ["$topology.tx_port", '"on"']

  plan:
    - comment: "Configure packet size"
      api: "pktgen.set"
      args: ["$topology.tx_port", '"size"', "$params.pktSize"]

    - comment: "Configure burst size"
      api: "pktgen.set"
      args: ["$topology.tx_port", '"burst"', "$params.burst"]

    - comment: "Set TTL value"
      api: "pktgen.set"
      args: ["$topology.tx_port", '"ttl"', "$params.ttl"]

    - comment: "Set packet rate"
      api: "pktgen.set"
      args: ["$topology.tx_port", '"rate"', "$params.rate"]

    - comment: "Set packet count (0 = transmit forever)"
      api: "pktgen.set"
      args: ["$topology.tx_port", '"count"', "$params.count"]

    - comment: "Start transmitting ICMP Echo Requests"
      api: "pktgen.start"
      args: ["$topology.tx_port"]

  teardown:
    - comment: "Stop all traffic"
      api: "pktgen.stop"
      args: ["$topology.tx_port"]

    - comment: "Disable ICMP Echo"
      api: "pktgen.icmp_echo"
      args: ["$topology.tx_port", '"off"']

    - comment: "Re-enable screen updates"
      api: "pktgen.screen"
      args: ['"on"']

  constraints: {}
