skill:
  name: arp_flood
  intent: traffic_generation
  description: Send ARP packets (Request or Gratuitous ARP) on specified ports at
    a configurable rate. ARP is an L2 protocol — no IP addresses or port numbers are
    used.
  params:
  - name: arp_type
    type: enum
    description: ARP packet type
    required: false
    default: request
    enum:
    - request
    - req
    - gratuitous
    - grat
    - g
  - name: rate
    type: float
    description: Packet rate in percentage (0-100)
    required: true
    constraints:
      min: 0
      max: 100
  - name: count
    type: integer
    description: Number of packets to transmit (0 = forever)
    required: false
    default: 0
  - name: burst
    type: integer
    description: Tx burst size
    required: false
    default: 128
  - name: duration
    type: integer
    description: 'Traffic duration in MILLISECONDS (0 = run forever). Example: 100s
      → 100000'
    required: false
    default: 0
  topology:
    tx_port:
      portlist: '0'
      description: Port used for TX
  setup:
  - comment: Disable screen updates for performance
    api: pktgen.screen
    args:
    - '"off"'
  - comment: Set packet type to ARP
    api: pktgen.set_type
    args:
    - $topology.tx_port
    - '"arp"'
  - comment: Enable Gratuitous ARP processing (if using gratuitous type)
    condition: $params.arp_type == "gratuitous" or $params.arp_type == "grat" or $params.arp_type
      == "g"
    api: pktgen.send_arp
    args:
    - $topology.tx_port
    - '"g"'
  plan:
  - comment: Configure burst size
    api: pktgen.set
    args:
    - $topology.tx_port
    - '"burst"'
    - $params.burst
  - comment: Set packet rate
    api: pktgen.set
    args:
    - $topology.tx_port
    - '"rate"'
    - $params.rate
  - comment: Set packet count (0 = transmit forever)
    api: pktgen.set
    args:
    - $topology.tx_port
    - '"count"'
    - $params.count
  - comment: Start ARP requests (using start arp CLI command via Lua)
    api: pktgen.send_arp
    args:
    - $topology.tx_port
    - $params.arp_type
  - comment: Start transmitting (keeps sending ARP at configured rate)
    api: pktgen.start
    args:
    - $topology.tx_port
  - comment: Wait for duration (milliseconds)
    api: pktgen.delay
    args:
    - $params.duration
    condition: $params.duration > 0
  teardown:
  - comment: Stop all traffic
    api: pktgen.stop
    args:
    - $topology.tx_port
  - comment: Re-enable screen updates
    api: pktgen.screen
    args:
    - '"on"'
  constraints: {}
