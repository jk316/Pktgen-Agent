# Skill: pcap_replay
# Intent: Replay a PCAP file on specified ports
# Grounded in: knowledge/pcap.yaml, knowledge/lua_api.yaml

skill:
  name: "pcap_replay"
  intent: "traffic_generation"
  description: "Replay packets from a PCAP file on a specified port. Requires pcap support enabled in pktgen."

  params:
    - name: "pcap_file"
      type: "string"
      description: "Path to the PCAP file"
      required: true

    - name: "rate"
      type: "float"
      description: "Packet rate in percentage (0-100)"
      required: false
      default: 100
      constraints: { min: 0, max: 100 }

    - name: "count"
      type: "integer"
      description: "Number of packets to send (0 = entire file, loop forever)"
      required: false
      default: 0

  topology:
    tx_port:
      portlist: "0"
      description: "Port used for PCAP replay"

  setup:
    - comment: "Disable screen updates"
      api: "pktgen.screen"
      args: ['"off"']

    - comment: "Note: PCAP file must be loaded at pktgen startup via -s <port>:<file> or via runtime pcap commands"
      skip: true

  plan:
    - comment: "Enable PCAP mode on the port"
      api: "pktgen.pcap"
      args: ["$topology.tx_port", '"on"']

    - comment: "Set packet rate"
      api: "pktgen.set"
      args: ["$topology.tx_port", '"rate"', "$params.rate"]

    - comment: "Set packet count"
      api: "pktgen.set"
      args: ["$topology.tx_port", '"count"', "$params.count"]

    - comment: "Start transmitting PCAP packets"
      api: "pktgen.start"
      args: ["$topology.tx_port"]

  teardown:
    - comment: "Stop traffic"
      api: "pktgen.stop"
      args: ["$topology.tx_port"]

    - comment: "Disable PCAP mode"
      api: "pktgen.pcap"
      args: ["$topology.tx_port", '"off"']

    - comment: "Re-enable screen"
      api: "pktgen.screen"
      args: ['"on"']

  constraints: {}
